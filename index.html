<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사말 출력 프로그램</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5em; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #004494; }
        button:focus { outline: 3px solid #0056b3; outline-offset: 2px; }
        input:focus { outline: 3px solid #0056b3; outline-offset: 1px; }
        #greetingOutput { margin-top: 20px; font-size: 1.2em; font-weight: bold; color: #0056b3; min-height: 1.5em; padding: 10px; background-color: #e9ecef; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>인사말 출력기</h1>
        <div class="form-group">
            <!-- label의 for 속성과 input의 id 속성을 연결하여 화면 읽기 프로그램이 정확히 안내하도록 합니다. -->
            <label for="nameInput">이름을 입력하세요</label>
            <input type="text" id="nameInput" placeholder="예: 홍길동">
        </div>
        <button id="greetButton">인사하기</button>

        <!-- aria-live 속성을 사용하여 동적으로 변경되는 텍스트를 화면 읽기 프로그램이 자동으로 읽어주도록 설정합니다. -->
        <div id="greetingOutput" aria-live="polite" aria-atomic="true"></div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const greetButton = document.getElementById('greetButton');
        const greetingOutput = document.getElementById('greetingOutput');

        function showGreeting() {
            const name = nameInput.value.trim();
            if (name) {
                greetingOutput.textContent = `안녕하세요, ${name}님! 만나서 반갑습니다.`;
            } else {
                greetingOutput.textContent = '이름이 입력되지 않았습니다. 텍스트 입력창에 이름을 먼저 입력해 주세요.';
            }
        }

        // 버튼 클릭 이벤트 처리
        greetButton.addEventListener('click', showGreeting);

        // 텍스트 입력창에서 엔터(Enter) 키를 눌렀을 때도 동작하도록 이벤트 처리
        nameInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                showGreeting();
            }
        });
    </script>
</body>
</html>
